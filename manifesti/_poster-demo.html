<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poster style demo</title>
<style>
@font-face{font-family:"SoSo26";src:url("/fonts/SoSo26.woff") format("woff");font-weight:400 900;font-display:block}
:root{--ss:"ss07","ss08","liga","calt"}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#000;font-family:"SoSo26","Arial Narrow",sans-serif;font-feature-settings:var(--ss)}

.poster{
  position:relative; width:100%; max-width:820px; margin:0 auto;
  min-height:100svh; padding:44px 40px 30px;
  display:flex; flex-direction:column;
}

/* il blocco-testo gigante, giustificato edge-to-edge (la firma dei manifesti) */
.big{
  font-weight:900; text-transform:uppercase; line-height:1.06; letter-spacing:-.012em;
  font-size:clamp(2.4rem,9vw,4.6rem);
  text-align:justify; text-align-last:justify; text-justify:inter-character;
  flex:1 1 auto;
}

/* timbro ruotato */
.stamp{
  position:absolute; left:50%; top:60%;
  transform:translate(-50%,-10%) rotate(-9deg);
  border:2.5px solid #000; border-radius:70px;
  padding:24px 52px; background:#fff; text-align:center;
  font-weight:900; text-transform:uppercase; line-height:1.12; letter-spacing:.02em;
  font-size:clamp(1.05rem,3.4vw,1.7rem);
}

/* piede: date a sx, luogo a dx */
.foot{
  display:flex; justify-content:space-between; align-items:flex-end; gap:18px;
  font-weight:700; text-transform:uppercase; line-height:1.25;
  font-size:clamp(.82rem,2.6vw,1.1rem); letter-spacing:.01em;
}

/* wordmark capovolto sul bordo inferiore */
.brandflip{
  margin-top:10px; text-align:center;
  font-weight:900; text-transform:uppercase; letter-spacing:.04em;
  font-size:clamp(1.4rem,5.5vw,2.6rem);
  transform:scaleY(-1);
}
</style>
</head>
<body>
<div class="poster">

  <p class="big">Hai sentito che domenica ci sono gli Ex-Otago e Auroro Borealo?</p>

  <div class="stamp">Biglietti early bird<br>fuori ora</div>

  <div class="foot">
    <span>31 luglio,<br>1 e 2 agosto 2026</span>
    <span>Castelfranco<br>Veneto</span>
  </div>

  <div class="brandflip">Sottosopra</div>

</div>
</body>
</html>
